<div th:fragment="nav-lateral" class="bg-lateral d-flex flex-column flex-shrink-0" style="width: 240px;">

    <!-- Bloco de estilo adicionado apenas para o efeito de Hover -->
    <style>
        /* Hover para o botão AMIGOS (usando a classe body_home que já está nele) */
        .bg-lateral .body_home {
            transition: background-color 0.2s ease;
        }
        .bg-lateral .body_home:hover {
            background-color: rgba(255, 255, 255, 0.08) !important;
            cursor: pointer;
        }

        /* Hover para os links dos chats (usando a classe hover-bg que já está neles) */
        .hover-bg {
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .hover-bg:hover {
            background-color: rgba(255, 255, 255, 0.05) !important;
        }
        /* Garante que o texto fique branco ao passar o mouse */
        .hover-bg:hover, .hover-bg:hover span {
            color: #ffffff !important;
        }
    </style>

    <!-- Barra de Busca -->
    <div class="p-2 shadow-sm" style="border-bottom: 1px solid #202225;">
        <input type="text" id="busca" name="busca" class="search-input" placeholder="Procurar ou iniciar uma conversa">
    </div>

    <div class="flex-grow-1 overflow-auto px-2 py-2">

        <!-- Botão para voltar à tela de Amigos -->
        <a th:href="@{/home/disponivel}" class="body_home d-flex align-items-center gap-3 text-white text-decoration-none p-2 rounded mb-3">
            <i class="bi bi-people-fill fs-5"></i>
            <span class="fw-bold small">AMIGOS</span>
        </a>

        <div class="d-flex justify-content-between align-items-center px-2 mb-2 text-secondary">
            <span class="small fw-bold" style="font-size: 11px;">MENSAGENS DIRETAS</span>
            <i class="bi bi-plus cursor-pointer hover-white fs-5"></i>
        </div>

        <!-- Link para o chat do Adaylson -->
        <a th:href="@{/me/chat/Adaylson}" class="d-flex align-items-center gap-2 p-2 rounded text-secondary text-decoration-none hover-bg">
            <div class="position-relative">
                <div class="rounded-circle d-flex align-items-center justify-content-center text-dark fw-bold" style="width: 32px; height: 32px; background-color: #f472b6;">A</div>
                <span class="position-absolute bottom-0 end-0 p-1 border border-dark rounded-circle" style="background-color: #23a559;"></span>
            </div>
            <span class="small text-white">Adaylson</span>
        </a>

        <!-- Link para o chat do Cap -->
        <a th:href="@{/me/chat/Cap}" class="d-flex align-items-center gap-2 p-2 rounded text-secondary text-decoration-none hover-bg">
            <div class="position-relative">
                <div class="rounded-circle d-flex align-items-center justify-content-center text-dark fw-bold" style="width: 32px; height: 32px; background-color: #60a5fa;">C</div>
                <span class="position-absolute bottom-0 end-0 p-1 border border-dark rounded-circle" style="background-color: #23a559;"></span>
            </div>
            <span class="small">Cap</span>
        </a>

        <!-- Link para o chat do Peppe -->
        <a th:href="@{/me/chat/Peppe}" class="d-flex align-items-center gap-2 p-2 rounded text-secondary text-decoration-none hover-bg">
            <div class="position-relative">
                <div class="rounded-circle d-flex align-items-center justify-content-center text-dark fw-bold" style="width: 32px; height: 32px; background-color: #3ba55d;">P</div>
                <span class="position-absolute bottom-0 end-0 p-1 border border-dark rounded-circle" style="background-color: #23a559;"></span>
            </div>
            <span class="small">Peppe</span>
        </a>

    </div>
</div>
