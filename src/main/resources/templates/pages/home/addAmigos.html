<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body class="d-flex vh-100 vw-100 m-0 body_home">

<!-- Barra de Servidores (Esquerda) -->
<div th:replace="~{fragments/nav-servers :: nav-servers}"></div>

<div class="d-flex flex-column flex-grow-1">

    <!-- Navbar Superior -->
    <div th:replace="~{fragments/navbar-superior :: nav-top}"></div>

    <div class="d-flex flex-grow-1 overflow-hidden">

        <!-- Barra Lateral de Amigos -->
        <div th:replace="~{fragments/navbar-lateral :: nav-lateral}"></div>

        <!-- Conteúdo Principal: Adicionar Amigo -->
        <main class="flex-grow-1 d-flex flex-column align-items-start p-4 body_home">

            <div class="add-friend-container w-100" style="max-width: 800px;">
                <h2 class="add-friend-title">Adicionar amigo</h2>
                <p class="add-friend-subtitle">Você pode adicionar amigos com o nome de usuário deles.</p>

                <!-- Wrapper do Input e Botão -->
                <form th:action="@{/addAmigo/nome}" method="post" >
                <div class="add-friend-input-wrapper shadow-sm">
                    <input
                            type="text"
                            name="PessoaPesquisada"
                            class="add-friend-input"
                            id="inputAmigo"
                            placeholder="Você pode adicionar amigos com o nome de usuário deles."
                            autocomplete="off">

                    <button class="btn-send-request" id="btnEnviar" disabled>
                        Enviar pedido de amizade
                    </button>
                </div>
                </form>

                <!-- Mensagens de Feedback (Escondidas por padrão) -->
                <p class="add-friend-success mt-3 text-success small" id="mensagemSucesso" style="display: none;">
                    Sucesso! Seu pedido de amizade foi enviado para <span id="nomeUsuario" class="fw-bold"></span>.
                </p>
            </div>

        </main>

    </div>
</div>

<div th:replace="~{fragments/modal-perfil :: modal-perfil}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script para habilitar o botão apenas quando houver texto (Estilo Discord) -->
<script>
    const inputAmigo = document.getElementById('inputAmigo');
    const btnEnviar = document.getElementById('btnEnviar');

    inputAmigo.addEventListener('input', function() {
        if (this.value.trim().length > 0) {
            btnEnviar.removeAttribute('disabled');
        } else {
            btnEnviar.setAttribute('disabled', 'disabled');
        }
    });
</script>
</body>
</html>
