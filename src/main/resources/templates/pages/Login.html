<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Global Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body class="auth-page">

<header>
  <div class="logo-container">
    <a th:href="@{/}" style="text-decoration: none;">
      <div class="logo-icon">GC</div>
    </a>
  </div>
</header>

<main class="auth-main">
  <div class="decoration-glow auth-glow"></div>

  <div class="action-card auth-card">
    <h2>Bem-vindo de volta!</h2>
    <p class="auth-subtitle">Que bom ver você de novo.</p>

    <p th:if="${erro}" style="color: red; margin-bottom: 10px;">
      <span th:text="${erro}"></span>
    </p>

    <form action="/login" method="POST">
      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
      </div>

      <button type="submit" class="btn btn-login btn-block">ENTRAR</button>
    </form>

    <div class="auth-footer">
      <p>Ainda não tem uma conta? <a th:href="@{/cadastro}">Cadastre-se</a></p>
    </div>
  </div>
</main>

</body>
</html>
