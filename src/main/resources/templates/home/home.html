<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Global Chat</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body {
        background-color: #36393f;
        overflow: hidden; /* Remove rolagem da tela inteira */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .hover-white:hover { color: white !important; }
    .hover-bg:hover { background-color: #393c43; color: white !important; }
    .cursor-pointer { cursor: pointer; }

    /* Estiliza a barra de rolagem para ficar escura e fina */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #2f3136; }
    ::-webkit-scrollbar-thumb { background: #202225; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #18191c; }
  </style>
</head>

<body class="d-flex vh-100 vw-100 m-0">

<div th:replace="~{fragments/nav-servers :: nav-servers}"></div>

<div class="d-flex flex-column flex-grow-1">

  <div th:replace="~{fragments/navbar-superior :: nav-top}"></div>

  <div class="d-flex flex-grow-1 overflow-hidden">

    <div th:replace="~{fragments/navbar-lateral :: nav-lateral}"></div>

    <main class="flex-grow-1 d-flex flex-column align-items-center justify-content-center text-center">
      <div style="opacity: 0.3;">
        <i class="bi bi-person-x-fill" style="font-size: 80px; color: #fff;"></i>
      </div>
      <p class="text-secondary mt-3 fs-6">Não há nenhum amigo online.</p>
    </main>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
