<head>

  <link rel="stylesheet" href="/css/login.css">

</head>
<body>

  <div class="header">
    <img class="header-logo" src="/static/imgs/Frame-78.svg" alt="">

  </div>
  <div class="body">
    <div class="cad-Box">
      <h2> LOGIN </h2>
      <div class="inputs-login-box">

        </form>
      </div>

    </div>
  </div>

</body>
