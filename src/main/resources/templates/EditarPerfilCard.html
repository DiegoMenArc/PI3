<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações de Perfil</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
        }

        body {
            /* Forçando a dimensão exata solicitada */
            width: 1910px;
            height: 1024px;
            background-color: #212328;
            color: #F2F3F5;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Evita barras de rolagem caso passe alguns pixels */
        }

        /* --- BARRA SUPERIOR --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 32px;
            border-bottom: 1px solid #4F545C;
            height: 60px;
        }

        .top-bar-title {
            font-size: 16px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: #B5BAC1;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #F2F3F5;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content {
            display: flex;
            justify-content: center;
            gap: 120px; /* Distância entre a coluna da esquerda e da direita */
            padding-top: 60px;
            height: calc(100% - 60px);
        }

        /* --- COLUNA DA ESQUERDA (FORMULÁRIO) --- */
        .left-column {
            width: 450px;
            display: flex;
            flex-direction: column;
        }

        .section-header {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #F2F3F5;
            margin-bottom: 8px;
        }

        .divider {
            height: 1px;
            background-color: #4F545C;
            border: none;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #3F4147; /* Linhas sutis entre os itens */
        }

        .form-group:last-child {
            border-bottom: none;
        }

        .label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #B5BAC1;
        }

        .input-field {
            background-color: #1E1F22;
            border: 1px solid #343439;
            color: #F2F3F5;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
            outline: none;
        }

        .input-field:focus {
            border-color: #5865F2;
        }

        textarea.input-field {
            resize: none;
            height: 80px;
        }

        .char-counter {
            font-size: 10px;
            color: #80848E;
            text-align: right;
            margin-top: 4px;
        }

        /* --- BOTÕES --- */
        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            background-color: #5865F2;
            color: white;
            width: fit-content;
        }

        .btn-primary:hover {
            background-color: #4752C4;
        }

        .btn-secondary {
            background-color: #2B2D31;
            color: white;
            border: 1px solid #3F4147;
            width: fit-content;
        }

        .btn-secondary:hover {
            background-color: #3F4147;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        /* Caixa de cor (Cor da faixa) */
        .color-picker-box {
            width: 60px;
            height: 40px;
            background-color: #FFFFFF;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
        }

        .color-picker-dot {
            width: 8px;
            height: 8px;
            background-color: #4F545C;
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
            right: 4px;
        }

        /* --- COLUNA DA DIREITA (PREVIEW) --- */
        .right-column {
            width: 340px;
            display: flex;
            flex-direction: column;
        }

        .preview-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #B5BAC1;
            margin-bottom: 12px;
        }

        .preview-card {
            background-color: #111214;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 32px;
            border: 1px solid #343439;
        }

        .preview-banner {
            height: 100px;
            background-color: #D9D9D9; /* Faixa superior cinza clara do design */
        }

        .preview-body {
            position: relative;
            padding: 16px;
            background-color: #242429;
            min-height: 150px;
        }

        .preview-avatar-wrapper {
            position: absolute;
            top: -40px;
            left: 16px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 6px solid #242429;
            background-color: #18191C;
        }

        .preview-avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .status-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            background-color: #23A559;
            border: 4px solid #242429;
            border-radius: 50%;
        }

        .preview-info {
            margin-top: 40px; /* Empurra o texto para baixo do avatar */
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .preview-username {
            font-size: 20px;
            font-weight: 700;
            color: white;
            line-height: 1;
        }

        .preview-subname {
            font-size: 14px;
            color: #B5BAC1;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .preview-subname::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #4F545C;
            border-radius: 50%;
        }

        .preview-bio {
            font-size: 14px;
            color: #DBDEE1;
        }

        .preview-btn {
            background-color: #5865F2;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            font-size: 14px;
            font-weight: 500;
            margin-top: 8px;
        }

        /* --- PLACA DE IDENTIFICAÇÃO (MOCK) --- */
        .placa-mock {
            background-color: #343439;
            border-radius: 100px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: fit-content;
            border: 1px solid #4D4D56;
        }

        .placa-mock span {
            font-size: 14px;
            font-weight: 500;
        }

        .placa-mock-circle {
            width: 24px;
            height: 24px;
            background-color: white;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-bar-title">Perfis</div>
    <button class="close-btn">✕</button>
</div>

<div class="main-content">

    <div class="left-column">
        <div class="section-header">Perfil Principal</div>
        <hr class="divider">

        <div class="form-group">
            <label class="label">Nome Exibido</label>
            <input type="text" class="input-field" value="Adaylson">
        </div>

        <div class="form-group">
            <label class="label">Widgets do perfil</label>
            <button class="btn btn-primary">Adicionar widgets</button>
        </div>

        <div class="form-group">
            <label class="label">Avatar</label>
            <div class="btn-group">
                <button class="btn btn-primary">Mudar avatar</button>
                <button class="btn btn-secondary">Remover avatar</button>
            </div>
        </div>

        <div class="form-group">
            <label class="label">Placa de identificação</label>
            <button class="btn btn-primary">Alterar Placa de identificação</button>
        </div>

        <div class="form-group">
            <label class="label">Efeito de perfil</label>
            <button class="btn btn-primary">Alterar efeito</button>
        </div>

        <div class="form-group">
            <label class="label">Cor da faixa</label>
            <div class="color-picker-box">
                <div class="color-picker-dot"></div>
            </div>
        </div>

        <div class="form-group">
            <label class="label">Bio</label>
            <textarea class="input-field"></textarea>
            <div class="char-counter">200</div>
        </div>
    </div>

    <div class="right-column">
        <div class="preview-title">Previa</div>

        <div class="preview-card">
            <div class="preview-banner"></div>
            <div class="preview-body">
                <div class="preview-avatar-wrapper">
                    <img src="https://placehold.co/80x80" alt="Avatar">
                    <div class="status-dot"></div>
                </div>

                <div class="preview-info">
                    <div>
                        <div class="preview-username">Adaylson</div>
                        <div class="preview-subname">Adaylson</div>
                    </div>
                    <div class="preview-bio">Escreva alguma coisa para ser adicionada a sua bio</div>
                    <button class="preview-btn">Botão exemplo</button>
                </div>
            </div>
        </div>

        <div class="preview-title" style="margin-top: 8px;">Placa de identificação</div>
        <div class="placa-mock">
            <span>Adaylson</span>
            <div class="placa-mock-circle"></div>
        </div>
    </div>

</div>

</body>
</html>
