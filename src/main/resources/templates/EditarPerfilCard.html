<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Configurações de Perfil - Final</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
            color: white;
        }

        body {
            background-color: #212328;
            width: 100vw; /* Ocupa a largura da tela */
            height: 100vh; /* Ocupa a altura da tela */
            overflow: hidden; /* Garante que nada transborde e crie barras */
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        .header {
            width: 100%;
            height: 58px;
            border-bottom: 1px solid #4F545C;
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            flex-shrink: 0; /* Impede o header de encolher */
        }

        .header-title { font-size: 14px; font-weight: 500; }

        .close-btn {
            width: 25px;
            height: 25px;
            background: rgba(32, 32, 36, 0.57);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .close-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .close-btn::before, .close-btn::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 2px;
            background: #F2F3F5;
            top: 11px;
            left: 4.5px;
        }
        .close-btn::before { transform: rotate(45deg); }
        .close-btn::after { transform: rotate(-45deg); }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-layout {
            display: flex;
            justify-content: center; /* Centraliza o conjunto na tela */
            padding-top: 60px;
            gap: 80px; /* Espaço entre as duas colunas */
            width: 100%;
            height: 100%;
        }

        /* COLUNA DA ESQUERDA */
        .edit-column {
            width: 634px; /* Tamanho da linha conforme Figma */
        }

        .section-header {
            width: 100%;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .line-divider {
            height: 1px;
            background: #4F545C;
            width: 100%;
            margin-bottom: 25px;
        }

        .input-group { margin-bottom: 20px; width: 287px; }
        .label-text { font-size: 10px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; color: #B5BAC1; }

        .text-input {
            width: 100%;
            height: 35px;
            background: #1E1F22;
            border: 1px solid #343439;
            border-radius: 4px;
            padding: 0 10px;
            font-size: 13px;
        }

        .small-divider { height: 1px; background: #4F545C; margin: 15px 0; width: 287px; }

        .btn {
            height: 32px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            padding: 0 16px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-blue { background: #5865F2; }
        .btn-gray { background: #4E5058; }

        .color-box { width: 61px; height: 39px; background: white; border-radius: 4px; }
        .bio-box {
            width: 287px;
            height: 100px;
            background: #1E1F22;
            border-radius: 4px;
            padding: 10px;
            font-size: 12px;
            border: none;
            resize: none;
        }

        /* COLUNA DA DIREITA (PRÉVIA) */
        .preview-column {
            width: 306px;
            /* Margem removida para não encostar na linha */
        }

        .card-preview {
            width: 306px;
            height: auto;
            min-height: 280px;
            background: #111214;
            border-radius: 12px;
            position: relative;
            margin-top: 15px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .card-banner { width: 100%; height: 90px; background: #D9D9D9; }

        .avatar-wrapper {
            position: absolute;
            top: 40px;
            left: 16px;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 6px solid #111214;
            background-color: #18191C;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .status-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 22px;
            height: 22px;
            background-color: #23A559;
            border: 4px solid #111214;
            border-radius: 50%;
        }

        .avatar-circle {
            width: 68px;
            height: 68px;
            background: #313338;
            border-radius: 50%;
        }

        .status-badge {
            position: absolute;
            width: 22px;
            height: 22px;
            background: #111214;
            border-radius: 50%;
            bottom: 2px;
            right: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .status-green { width: 14px; height: 14px; background: #23a55a; border-radius: 50%; }

        .card-body { padding: 55px 16px 16px; }
        .name-1 { font-size: 18px; font-weight: 700; }
        .name-2 { font-size: 14px; color: #B5BAC1; margin-bottom: 12px; }
        .bio-text { font-size: 13px; line-height: 1.4; border-top: 1px solid #313338; padding-top: 12px; }

        .badge-area {
            margin-top: 30px;
        }

        .badge-item {
            width: 306px;
            height: 40px;
            background: #111214;
            border: 1px solid #343439;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 10px;
            margin-top: 10px;
        }

        .badge-circle {
            width: 24px;
            height: 24px;
            background: #313338;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .badge-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

    </style>
</head>
<body>

<header class="header">
    <div class="header-title">Perfis</div>
    <div onclick="window.location.href = '/' " class="close-btn"></div>
</header>

<main class="main-layout">

    <section class="edit-column">
        <div class="section-header">
            <h2 class="section-title">Perfil Principal</h2>
            <div class="line-divider"></div>
        </div>

        <div class="input-group">
            <label class="label-text">Nome Exibido</label>
            <input type="text" class="text-input" value="Adaylson">
        </div>

        <div class="small-divider"></div>

        <div class="input-group">
            <label class="label-text">Widgets do perfil</label>
            <button class="btn btn-blue">Adicionar widgets</button>
        </div>

        <div class="small-divider"></div>

        <div class="input-group">
            <label class="label-text">Avatar</label>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-blue">Mudar avatar</button>
                <button class="btn btn-gray">Remover avatar</button>
            </div>
        </div>

        <div class="small-divider"></div>

        <div class="input-group">
            <label class="label-text">Placa de identificaçao</label>
            <button class="btn btn-blue" style="width: 100%;">Alterar Placa de identificaçao</button>
        </div>

        <div class="small-divider"></div>

        <div class="input-group">
            <label class="label-text">Cor da faixa</label>
            <div class="color-box"></div>
        </div>

        <div class="small-divider"></div>

        <div class="input-group">
            <label class="label-text">Bio</label>
            <textarea class="bio-box">Escreva alguma coisa para ser adicionada a sua bio</textarea>
            <p style="font-size: 9px; color: #4F545C; text-align: right; margin-top: 4px;">200</p>
        </div>
    </section>

    <section class="preview-column">
        <h2 class="label-text" style="color: white;">Prévia</h2>

        <div class="card-preview">
            <div class="card-banner"></div>

            <div class="avatar-wrapper">
                <img src="https://placehold.co/90x90" alt="Avatar">
                <div class="status-dot"></div>
            </div>


            <div class="card-body">
                <div class="name-1">Adaylson</div>
                <div class="name-2">Adaylson</div>

                <button class="btn btn-blue" style="width: 100%; margin-bottom: 15px;">Botão exemplo</button>

                <div class="bio-text">
                    Escreva alguma coisa para ser adicionada a sua bio
                </div>
            </div>
        </div>

        <div class="badge-area">
            <h2 class="label-text" style="color: white;">Placa de identificação</h2>
            <div class="badge-item">
                <div class="badge-circle">
                    <img src="https://placehold.co/24x24" alt="Ícone Placa">
                </div>
                <span style="font-size: 14px; font-weight: 500;">Adaylson</span>
            </div>
        </div>
    </section>

</main>

</body>
</html>
