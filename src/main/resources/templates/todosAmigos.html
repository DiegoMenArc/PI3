<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone - Interface Estática</title>
    <link rel="stylesheet" href="/css/todosAmigos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="search-container">
            <input type="text" placeholder="Procure um amigo">
        </div>

        <nav class="sidebar-nav">
            <div class="nav-item active">
                <i class="fa-solid fa-user-group"></i> <span>Amigos</span>
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-bolt"></i> <span>Pedidos</span>
            </div>
        </nav>

        <div class="direct-messages">
            <div class="dm-header">
                <span>CONVERSAS</span>
                <button class="add-dm">+</button>
            </div>

            <ul class="friends-list">
                <li class="friend-item">
                    <div class="avatar-wrapper">
                        <div class="avatar" style="background-color: #5865f2;"></div>
                        <div class="status-indicator online"></div>
                    </div>
                    <div class="friend-info">
                        <span class="friend-name">jesutoyosi</span>
                        <span class="friend-status">Playing debugger</span>
                    </div>
                </li>
                <li class="friend-item">
                    <div class="avatar-wrapper">
                        <div class="avatar" style="background-color: #248046;"></div>
                        <div class="status-indicator idle"></div>
                    </div>
                    <div class="friend-info">
                        <span class="friend-name">Binary</span>
                        <span class="friend-status">Disponível</span>
                    </div>
                </li>
            </ul>
        </div>

        <div class="user-footer">
            <div class="user-info">
                <div class="avatar-small"></div>
                <div class="user-details">
                    <span class="username">Adaylson</span>
                    <span class="user-tag">#2026</span>
                </div>
            </div>
            <div class="user-controls">
                <i class="fa-solid fa-gear"></i>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="top-bar-left">
                <i class="fa-solid fa-user-group"></i>
                <span class="title">Amigos</span>
                <div class="divider"></div>
                <nav class="top-nav">
                    <a href="http://localhost:8080/">Disponível</a>
                    <a href="http://localhost:8080/todos" class="active">Todos</a>
                    <a href="#">Pendente</a>
                    <a href="#">Bloqueado</a>
                    <button class="btn-add-friend">Adicionar Amigo</button>
                </nav>
            </div>
        </header>

        <section class="friends-table">
            <div class="search-bar-main">
                <input type="text" placeholder="Buscar">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <div class="friends-grid">
                <div class="grid-header">TODOS OS AMIGOS — 1</div>

                <div class="friend-row">
                    <div class="row-left">
                        <div class="avatar-medium"></div>
                        <div class="row-details">
                            <span class="row-name">jesutoyosi</span>
                            <span class="row-status">Offline</span>
                        </div>
                    </div>
                    <div class="row-actions">
                        <i class="fa-solid fa-message" title="Enviar Mensagem"></i>
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
